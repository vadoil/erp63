name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_PATH: ${{ secrets.VPS_PATH }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://bnrvlbufkodtawchbkuq.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucnZsYnVma29kdGF3Y2hia3VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODg1NzcsImV4cCI6MjA5MjE2NDU3N30.z1_HGtqxK6qzi6Y-qrCCW3pIt_kC-xXjEFimZceg6SY' }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'bnrvlbufkodtawchbkuq' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=0
          for var in VPS_HOST VPS_USER VPS_PATH; do
            if [ -z "${!var}" ]; then
              echo "::error::Secret $var is empty or not set"
              missing=1
            fi
          done
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::Secret VPS_SSH_KEY is empty or not set"
            missing=1
          fi
          if [ "$missing" = "1" ]; then
            echo "Add the missing secrets in: Repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup SSH
        run: |
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          PORT="${VPS_PORT:-22}"
          rsync -avz --delete --no-times --no-perms --omit-dir-times \
            -e "ssh -i ~/.ssh/id_ed25519 -p $PORT -o StrictHostKeyChecking=yes" \
            dist/ \
            "$VPS_USER@$VPS_HOST:$VPS_PATH"
