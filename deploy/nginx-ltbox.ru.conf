# /etc/nginx/sites-available/ltbox.ru
# Симлинк: ln -s /etc/nginx/sites-available/ltbox.ru /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name ltbox.ru www.ltbox.ru;

    # Для выпуска сертификата Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ltbox.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.ltbox.ru;

    ssl_certificate     /etc/letsencrypt/live/ltbox.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ltbox.ru/privkey.pem;

    return 301 https://ltbox.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ltbox.ru;

    root /var/www/ltbox.ru;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/ltbox.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ltbox.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Кэш статики
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html не кэшировать (чтобы новые билды сразу подхватывались)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/ltbox.ru.access.log;
    error_log  /var/log/nginx/ltbox.ru.error.log;
}
